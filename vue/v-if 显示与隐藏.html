<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <script src="https://unpkg.com/vue@next"></script>
</head>
<body>
    <div id="app"></div>
</body>
<script>
    Vue.createApp({
        data() {
            return {
                show: true
            }
        },
        methods: {
            handleClick() {
                this.show = !this.show
            }
        },
        template: `
            <div v-if="show">hello</div>
            <button @click="handleClick"> show </div>
        `
    }).mount('#app')
</script>
</html>
