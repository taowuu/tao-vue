<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <script src="https://unpkg.com/vue@next"></script>
</head>
<body>
    <div id="app"></div>
</body>
<script>
    Vue.createApp({
        data() {
            return {
                data: 'hello'
            }
        },
        template: `
            <button v-bind:title="data"> bind </button>
        `
    }).mount('#app')
</script>
</html>
